<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бронирование сплава — SUP CLUB ASTANA</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Возвращаем сочный Deep Dark & Gold дизайн */
        body.dark-theme {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        h2 {
            color: #d4af37; /* Золотой заголовок */
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #e5e7eb;
            font-size: 0.95rem;
        }

        /* Поля ввода в стиле Deep Dark */
        .form-group select, 
        .form-group input {
            width: 100%;
            padding: 12px;
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .form-group select:focus, 
        .form-group input:focus {
            outline: none;
            border-color: #d4af37; /* Золотой фокус */
        }

        /* Сетка слотов времени */
        .slots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        /* Кнопки слотов */
        .slot-btn {
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 14px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .slot-btn strong {
            font-size: 1.15rem;
            color: #ffffff;
            display: block;
            margin-bottom: 4px;
        }

        .slot-btn .info-spots {
            font-size: 0.8rem;
            color: #9ca3af;
        }

        /* Наведение и Активное состояние (Золото) */
        .slot-btn:hover:not(.disabled) {
            border-color: #d4af37;
            background: #1c1c1c;
        }

        .slot-btn.active {
            border-color: #d4af37;
            background: #d4af37;
        }

        .slot-btn.active strong, 
        .slot-btn.active .info-spots {
            color: #000000;
            font-weight: bold;
        }

        /* Обычный заблокированный слот (Кончились места) */
        .slot-btn.disabled {
            background: #101010;
            border-color: #1a1a1a;
            opacity: 0.4;
            cursor: not-allowed;
        }

        .slot-btn.disabled strong {
            color: #4b5563;
        }

        .slot-btn.disabled .info-spots {
            color: #4b5563;
        }

        /* Автоблокировка по времени («Стоп за 3 часа», «Закрыто в 22:00») */
        .slot-btn.auto-blocked {
            background: #1a1111; /* Слегка красноватый глубокий фон */
            border-color: #7f1d1d; /* Темно-красный бордер */
            opacity: 0.85;
            cursor: not-allowed;
        }

        .slot-btn.auto-blocked strong {
            color: #9ca3af;
        }

        /* Кнопка отправки */
        .btn-primary {
            background: #d4af37;
            color: #000000;
            border: none;
            padding: 15px;
            font-size: 1.05rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary:hover:not(:disabled) {
            background: #f1c43f;
        }

        .btn-primary:disabled {
            background: #2a2a2a;
            color: #666666;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="dark-theme">

    <div class="container">
        <h2>Бронирование SUP-сплава</h2>
        
        <!-- Выбор маршрута -->
        <div class="form-group">
            <label>Маршрут сплава:</label>
            <select id="routeType" onchange="onRouteChange()">
                <option value="turan-atyrau">Городской сплав (ЖК Туран — мост Атырау)</option>
                <option value="sunrise">Рассветный сплав (06:00)</option>
            </select>
        </div>

        <!-- Выбор даты -->
        <div class="form-group">
            <label>Дата сплава:</label>
            <input type="date" id="bookingDate" onchange="renderSlots()">
        </div>

        <!-- Промокод -->
        <div class="form-group">
            <label>Промокод (если есть):</label>
            <input type="text" id="promoCode" placeholder="ВВЕДИТЕ КОД" oninput="renderSlots()">
        </div>

        <!-- Контейнер для вывода экранов закрытия (Воскресенье / Мест нет) -->
        <div id="sundayWrapper"></div>

        <!-- Поля бронирования -->
        <div id="bookingFieldsContainer">
            <div class="form-group">
                <label>Доступное время и места:</label>
                <div id="slotsWrapper" class="slots-grid">
                    <!-- Генерируется из JS -->
                </div>
            </div>

            <div class="form-group" style="margin-top: 25px;">
                <label>Количество человек:</label>
                <select id="spotsCount">
                    <option value="">Сначала выберите время</option>
                </select>
            </div>

            <div class="form-group">
                <label>Ваше имя:</label>
                <input type="text" id="customerName" required placeholder="Имя">
            </div>
            <div class="form-group">
                <label>Телефон (WhatsApp):</label>
                <input type="tel" id="customerPhone" required placeholder="+7 (707) 000-00-00">
            </div>
        </div>

        <p id="redirectNotice" style="font-size: 0.85rem; color: #888; margin-top: 20px; text-align: center;">
            * После нажатия кнопки вы будете перенаправлены на оплату Каспи.
        </p>
        <button id="submitBtn" class="btn-primary" onclick="handleBooking()" style="width: 100%; margin-top: 5px;">Забронировать</button>
    </div>

    <script>
        // ДАННЫЕ SUPABASE (Подставь свои рабочие урлы и ключи)
        const BASE_SUPABASE_URL = "https://your-supabase-url.supabase.co/rest/v1"; 
        const ANON_KEY = "your-anon-key"; 

        const SECRET_CODES = {
            'VIP666': '06:00',
            'NIGHTSUP': '21:00'
        };

        let selectedRouteType = 'turan-atyrau';
        let selectedTime = null;
        let isSubmitting = false;

        // Дефолтная дата — сегодня
        const todayInputStr = new Date().toISOString().split('T')[0];
        document.getElementById('bookingDate').min = todayInputStr;
        document.getElementById('bookingDate').value = todayInputStr;

        function onRouteChange() {
            selectedRouteType = document.getElementById('routeType').value;
            selectedTime = null;
            renderSlots();
        }

        function showClosedScreen(fields, notice, sunWrap, btn, title, text, isSunday) {
            fields.style.display = 'none';
            notice.style.display = 'none';
            btn.disabled = true;
            
            sunWrap.innerHTML = `
                <div style="text-align:center; padding: 25px 15px; border: 1px solid ${isSunday ? '#d4af37' : '#7f1d1d'}; background: #141414; border-radius:8px; margin: 20px 0;">
                    <h3 style="color:${isSunday ? '#d4af37' : '#ef4444'}; margin-top:0; margin-bottom:10px;">${title}</h3>
                    <p style="color:#9ca3af; font-size:0.9rem; line-height:1.4; margin:0;">${text}</p>
                </div>
            `;
        }

        async function renderSlots() {
            const wrapper = document.getElementById('slotsWrapper');
            const sundayWrapper = document.getElementById('sundayWrapper');
            const fieldsContainer = document.getElementById('bookingFieldsContainer');
            const dateInput = document.getElementById('bookingDate').value;
            const promoInput = document.getElementById('promoCode').value.trim().toUpperCase();
            const submitBtn = document.getElementById('submitBtn');
            const notice = document.getElementById('redirectNotice');
            
            if (!dateInput) return;

            const dateParts = dateInput.split('-');
            const selectedDateObj = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]);
            const dayOfWeek = selectedDateObj.getDay();

            if (dayOfWeek === 0) {
                showClosedScreen(fieldsContainer, notice, sundayWrapper, submitBtn, 'Воскресенье: городской сплав закрыт', 'В этот день у нас проходит большой загородный сап-тур!', true);
                return;
            }

            wrapper.innerHTML = '<div style="grid-column: 1/-1; text-align:center; color:#666; padding:10px; font-size:0.9rem;">Проверка мест...</div>';
            
            let bookings = [];
            let blocks = [];

            try {
                const headers = { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}`, 'Content-Type': 'application/json' };
                const [resBookings, resBlocks] = await Promise.all([
                    fetch(`${BASE_SUPABASE_URL}/bookings?booking_date=eq.${dateInput}`, { method: 'GET', headers }),
                    fetch(`${BASE_SUPABASE_URL}/blocked_slots?block_date=eq.${dateInput}`, { method: 'GET', headers })
                ]);

                if (resBookings.ok) bookings = await resBookings.json();
                if (resBlocks.ok) blocks = await resBlocks.json();
            } catch (e) { console.error("Ошибка:", e); }

            const isDayBlocked = blocks.some(b => b.slot_time.trim().toUpperCase() === 'ALL');
            if (isDayBlocked) {
                showClosedScreen(fieldsContainer, notice, sundayWrapper, submitBtn, 'Все места заняты', 'К сожалению, на этот день свободных сапов больше нет.', false);
                return;
            }

            if (!isSubmitting) { submitBtn.disabled = false; notice.style.display = 'block'; }
            fieldsContainer.style.display = 'block';
            sundayWrapper.innerHTML = '';

            let defaultTimes = selectedRouteType === 'turan-atyrau' ? ['10:00', '13:00', '16:00', '18:00'] : ['06:00'];
            
            if (SECRET_CODES[promoInput]) {
                const secretTime = SECRET_CODES[promoInput];
                if (!defaultTimes.includes(secretTime)) defaultTimes.unshift(secretTime);
            }

            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            
            const tomorrow = new Date();
            tomorrow.setDate(now.getDate() + 1);
            const tomorrowStr = `${tomorrow.getFullYear()}-${String(tomorrow.getMonth() + 1).padStart(2, '0')}-${String(tomorrow.getDate()).padStart(2, '0')}`;

            wrapper.innerHTML = '';
            let visibleSlotsCount = 0;

            defaultTimes.forEach(time => {
                const blockData = blocks.find(b => b.slot_time.replace(/\s/g, '').startsWith(time));

                let adminOccupiedSpots = 0;
                let isFullyBlockedByAdmin = false;

                if (blockData) {
                    const rawTimeValue = blockData.slot_time.trim();
                    const match = rawTimeValue.match(/\[(\d+)\]/);
                    if (match) {
                        adminOccupiedSpots = parseInt(match[1], 10);
                    } else {
                        isFullyBlockedByAdmin = true;
                    }
                }

                if (isFullyBlockedByAdmin) return; 

                visibleSlotsCount++;
                
                let isAutoBlocked = false;
                let blockReason = '';

                // Проверка утра
                if (time === '06:00') {
                    if (dateInput === todayStr) {
                        isAutoBlocked = true;
                        blockReason = 'Сплав прошёл';
                    } else if (dateInput === tomorrowStr && now.getHours() >= 22) {
                        isAutoBlocked = true;
                        blockReason = 'До 22:00 вчер.';
                    }
                }

                // Проверка дня (за 3 часа)
                if (dateInput === todayStr && time !== '06:00') {
                    const [slotH, slotM] = time.split(':').map(Number);
                    const slotTimeObj = new Date();
                    slotTimeObj.setHours(slotH, slotM, 0, 0);
                    const diffInHours = (slotTimeObj - now) / (1000 * 60 * 60);
                    
                    if (diffInHours < 0) {
                        isAutoBlocked = true;
                        blockReason = 'Сплав прошёл';
                    } else if (diffInHours < 3) {
                        isAutoBlocked = true;
                        blockReason = 'Стоп за 3 часа';
                    }
                }

                const clientBooked = bookings.filter(b => b.booking_time === time).reduce((sum, b) => sum + b.spots_count, 0);
                const left = 6 - clientBooked - adminOccupiedSpots;
                
                const btn = document.createElement('div');
                
                if (isAutoBlocked) {
                    btn.className = 'slot-btn auto-blocked';
                    btn.innerHTML = `<strong>${time}</strong><span class="info-spots" style="color:#ef4444; font-weight:bold;">${blockReason}</span>`;
                } 
                else if (left <= 0) {
                    btn.className = 'slot-btn disabled';
                    btn.innerHTML = `<strong>${time}</strong><span class="info-spots">Мест нет</span>`;
                } 
                else {
                    btn.className = 'slot-btn';
                    if (time === selectedTime) btn.classList.add('active');
                    btn.innerHTML = `<strong>${time}</strong><span class="info-spots">Свободно: ${left}</span>`;
                    
                    btn.addEventListener('click', function() {
                        if (isSubmitting) return;
                        document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        selectedTime = time;
                        
                        const select = document.getElementById('spotsCount');
                        select.innerHTML = '';
                        for (let i = 1; i <= left; i++) {
                            const opt = document.createElement('option');
                            opt.value = i;
                            opt.textContent = `${i} чел.`;
                            select.appendChild(opt);
                        }
                    });
                }
                wrapper.appendChild(btn);
            });

            if (visibleSlotsCount === 0) {
                wrapper.innerHTML = '<div style="grid-column: 1/-1; text-align:center; color:#ef4444; padding:10px; font-weight:700;">Нет доступных слотов</div>';
                submitBtn.disabled = true;
            }
        }

        async function handleBooking() {
            if (!selectedTime) { alert('Пожалуйста, выберите время сплава!'); return; }
            const spots = document.getElementById('spotsCount').value;
            if (!spots) { alert('Выберите количество человек!'); return; }
            alert(`Бронируем время ${selectedTime}, мест: ${spots}`);
        }

        renderSlots();
    </script>
</body>
</html>
