<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бронирование сплава — SUP CLUB ASTANA</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Стили для слотов (активные, заблокированные, с ошибками) */
        .slots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }
        .slot-btn {
            background: #111111;
            border: 2px solid #222222;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .slot-btn strong {
            font-size: 1.2rem;
            color: #ffffff;
            display: block;
            margin-bottom: 4px;
        }
        .slot-btn .info-spots {
            font-size: 0.85rem;
            color: #d1d5db;
        }
        .slot-btn:hover:not(.disabled) {
            border-color: #d4af37; /* Золотой при наведении */
            background: #161616;
        }
        .slot-btn.active {
            border-color: #d4af37;
            background: #d4af37;
        }
        .slot-btn.active strong, .slot-btn.active .info-spots {
            color: #000000;
        }
        .slot-btn.disabled {
            background: #1a1a1a;
            border-color: #2a2a2a;
            opacity: 0.6;
            cursor: not-allowed;
        }
        .slot-btn.disabled strong {
            color: #666666;
        }
        .slot-btn.disabled .info-spots {
            color: #888888;
        }
        .slot-btn.auto-blocked {
            background: #1a1111;
            opacity: 0.85;
        }
        .slot-btn.auto-blocked strong {
            color: #999999;
        }
    </style>
</head>
<body class="dark-theme">

    <div class="container">
        <h2>Бронирование SUP-сплава</h2>
        
        <!-- Выбор маршрута -->
        <div class="form-group">
            <label>Выберите маршрут:</label>
            <select id="routeType" onchange="onRouteChange()">
                <option value="turan-atyrau">Городской сплав (ЖК Туран — мост Атырау)</option>
                <option value="sunrise">Рассветный сплав (06:00)</option>
            </select>
        </div>

        <!-- Выбор даты -->
        <div class="form-group">
            <label>Выберите дату:</label>
            <input type="date" id="bookingDate" onchange="renderSlots()">
        </div>

        <!-- Промокод -->
        <div class="form-group">
            <label>Промокод (если есть):</label>
            <input type="text" id="promoCode" placeholder="ВВЕДИТЕ КОД" oninput="renderSlots()">
        </div>

        <!-- Контейнер для вывода экранов закрытия (Воскресенье / Мест нет) -->
        <div id="sundayWrapper"></div>

        <!-- Поля бронирования, которые скрываются, если день полностью закрыт -->
        <div id="bookingFieldsContainer">
            <div class="form-group">
                <label>Доступное время и места:</label>
                <div id="slotsWrapper" class="slots-grid">
                    <!-- Слоты генерируются динамически через JS -->
                </div>
            </div>

            <div class="form-group" style="margin-top: 20px;">
                <label>Количество человек:</label>
                <select id="spotsCount">
                    <option value="">Сначала выберите время</option>
                </select>
            </div>

            <!-- Дополнительные поля формы (Имя, Телефон и т.д.) -->
            <div class="form-group">
                <label>Ваше имя:</label>
                <input type="text" id="customerName" required placeholder="Иван">
            </div>
            <div class="form-group">
                <label>Телефон (WhatsApp):</label>
                <input type="tel" id="customerPhone" required placeholder="+7 (707) 000-00-00">
            </div>
        </div>

        <p id="redirectNotice" style="font-size: 0.9rem; color: #888; margin-top: 15px;">
            * После нажатия кнопки вы будете перенаправлены на оплату Каспи.
        </p>
        <button id="submitBtn" class="btn-primary" onclick="handleBooking()" style="width: 100%; margin-top: 10px;">Забронировать</button>
    </div>

    <!-- КОНФИГУРАЦИЯ И ЛОГИКА -->
    <script>
        // ТВОИ ДАННЫЕ SUPABASE (Подставь свои реальные ссылки)
        const BASE_SUPABASE_URL = "https://your-supabase-url.supabase.co/rest/v1"; 
        const ANON_KEY = "your-anon-key"; 

        // Секретные промокоды для скрытых слотов
        const SECRET_CODES = {
            'VIP666': '06:00',
            'NIGHTSUP': '21:00'
        };

        let selectedRouteType = 'turan-atyrau';
        let selectedTime = null;
        let isSubmitting = false;

        // Инициализация даты (минимум — сегодня)
        const todayInputStr = new Date().toISOString().split('T')[0];
        document.getElementById('bookingDate').min = todayInputStr;
        document.getElementById('bookingDate').value = todayInputStr;

        function onRouteChange() {
            selectedRouteType = document.getElementById('routeType').value;
            selectedTime = null;
            renderSlots();
        }

        function showClosedScreen(fields, notice, sunWrap, btn, title, text, isSunday) {
            fields.style.display = 'none';
            notice.style.display = 'none';
            btn.disabled = true;
            
            sunWrap.innerHTML = `
                <div style="text-align:center; padding: 30px 10px; border: 2px dashed ${isSunday ? '#d4af37' : '#ef4444'}; border-radius:12px; margin: 20px 0;">
                    <h3 style="color:${isSunday ? '#d4af37' : '#ef4444'}; margin-bottom:10px;">${title}</h3>
                    <p style="color:#d1d5db; font-size:0.95rem; line-height:1.4;">${text}</p>
                </div>
            `;
        }

        async function renderSlots() {
            const wrapper = document.getElementById('slotsWrapper');
            const sundayWrapper = document.getElementById('sundayWrapper');
            const fieldsContainer = document.getElementById('bookingFieldsContainer');
            const dateInput = document.getElementById('bookingDate').value;
            const promoInput = document.getElementById('promoCode').value.trim().toUpperCase();
            const submitBtn = document.getElementById('submitBtn');
            const notice = document.getElementById('redirectNotice');
            
            if (!dateInput) return;

            const dateParts = dateInput.split('-');
            const selectedDateObj = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]);
            const dayOfWeek = selectedDateObj.getDay();

            // Воскресенье закрыто для города
            if (dayOfWeek === 0) {
                showClosedScreen(fieldsContainer, notice, sundayWrapper, submitBtn, 'Воскресенье: запись на городской сплав невозможна', 'В этот день у нас проходит загородный сап-тур!', true);
                return;
            }

            wrapper.innerHTML = '<div style="grid-column: 1/-1; text-align:center; color:#888; padding:10px;">Проверка свободных мест...</div>';
            
            let bookings = [];
            let blocks = [];

            try {
                const headers = { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}`, 'Content-Type': 'application/json' };
                const [resBookings, resBlocks] = await Promise.all([
                    fetch(`${BASE_SUPABASE_URL}/bookings?booking_date=eq.${dateInput}`, { method: 'GET', headers }),
                    fetch(`${BASE_SUPABASE_URL}/blocked_slots?block_date=eq.${dateInput}`, { method: 'GET', headers })
                ]);

                if (resBookings.ok) bookings = await resBookings.json();
                if (resBlocks.ok) blocks = await resBlocks.json();
            } catch (e) { console.error("Ошибка загрузки данных:", e); }

            // Полная блокировка всего дня
            const isDayBlocked = blocks.some(b => b.slot_time.trim().toUpperCase() === 'ALL');
            if (isDayBlocked) {
                showClosedScreen(fieldsContainer, notice, sundayWrapper, submitBtn, 'Мест нет', 'К сожалению, все доступные места на этот день уже забронированы.', false);
                return;
            }

            if (!isSubmitting) { submitBtn.disabled = false; notice.style.display = 'block'; }
            fieldsContainer.style.display = 'block';
            sundayWrapper.innerHTML = '';

            // Базовые слоты в зависимости от селектора
            let defaultTimes = selectedRouteType === 'turan-atyrau' ? ['10:00', '13:00', '16:00', '18:00'] : ['06:00'];
            
            // Если введен промокод
            if (SECRET_CODES[promoInput]) {
                const secretTime = SECRET_CODES[promoInput];
                if (!defaultTimes.includes(secretTime)) defaultTimes.unshift(secretTime);
            }

            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            
            const tomorrow = new Date();
            tomorrow.setDate(now.getDate() + 1);
            const tomorrowStr = `${tomorrow.getFullYear()}-${String(tomorrow.getMonth() + 1).padStart(2, '0')}-${String(tomorrow.getDate()).padStart(2, '0')}`;

            wrapper.innerHTML = '';
            let visibleSlotsCount = 0;

            defaultTimes.forEach(time => {
                // Ищем, заблокировал ли админ этот слот (полностью или частично)
                // Очищаем время от пробелов для точного сравнения
                const blockData = blocks.find(b => {
                    const cleanBlockTime = b.slot_time.replace(/\s/g, '');
                    return cleanBlockTime.startsWith(time);
                });

                let adminOccupiedSpots = 0; // сколько мест сожрал админ
                let isFullyBlockedByAdmin = false;

                if (blockData) {
                    const rawTimeValue = blockData.slot_time.trim();
                    // Проверяем паттерн типа "13:00[5]"
                    const match = rawTimeValue.match(/\[(\d+)\]/);
                    if (match) {
                        adminOccupiedSpots = parseInt(match[1], 10);
                    } else {
                        // Если скобок нет, значит это обычный блок "13:00" — закрываем наглухо
                        isFullyBlockedByAdmin = true;
                    }
                }

                if (isFullyBlockedByAdmin) return; // Слот убран админом полностью

                visibleSlotsCount++;
                
                let isAutoBlocked = false;
                let blockReason = '';

                // АВТОБЛОК: УТРЕННИЕ (06:00) — стоп в 22:00 прошлого вечера
                if (time === '06:00') {
                    if (dateInput === todayStr) {
                        isAutoBlocked = true;
                        blockReason = 'Сплав уже прошёл';
                    } else if (dateInput === tomorrowStr && now.getHours() >= 22) {
                        isAutoBlocked = true;
                        blockReason = 'Запись закрыта в 22:00';
                    }
                }

                // АВТОБЛОК: ДНЕВНЫЕ — стоп за 3 часа до старта
                if (dateInput === todayStr && time !== '06:00') {
                    const [slotH, slotM] = time.split(':').map(Number);
                    const slotTimeObj = new Date();
                    slotTimeObj.setHours(slotH, slotM, 0, 0);
                    const diffInHours = (slotTimeObj - now) / (1000 * 60 * 60);
                    
                    if (diffInHours < 0) {
                        isAutoBlocked = true;
                        blockReason = 'Сплав уже прошёл';
                    } else if (diffInHours < 3) {
                        isAutoBlocked = true;
                        blockReason = 'Стоп за 3 часа до старта';
                    }
                }

                // Считаем реальные брони клиентов из базы
                const clientBooked = bookings.filter(b => b.booking_time === time).reduce((sum, b) => sum + b.spots_count, 0);
                
                // Итого свободных мест: Максимум (6) минус брони, минус хотелка админа
                const left = 6 - clientBooked - adminOccupiedSpots;
                
                const btn = document.createElement('div');
                
                // Вариант 1: Жесткий автоблок по времени (чтобы мозг не ебали)
                if (isAutoBlocked) {
                    btn.className = 'slot-btn disabled auto-blocked';
                    btn.style.borderColor = '#ef4444'; 
                    btn.innerHTML = `<strong>${time}</strong><span class="info-spots" style="color:#ef4444; font-weight:bold;">${blockReason}</span>`;
                } 
                // Вариант 2: Мест реально физически не осталось (или админ забрал)
                else if (left <= 0) {
                    btn.className = 'slot-btn disabled';
                    btn.innerHTML = `<strong>${time}</strong><span class="info-spots">Мест нет</span>`;
                } 
                // Вариант 3: Слот открыт и доступен
                else {
                    btn.className = 'slot-btn';
                    if (time === selectedTime) btn.classList.add('active');
                    btn.innerHTML = `<strong>${time}</strong><span class="info-spots">Свободно: ${left}</span>`;
                    
                    btn.addEventListener('click', function() {
                        if (isSubmitting) return;
                        document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        selectedTime = time;
                        
                        // Перестраиваем выпадающий список мест под этот слот
                        const select = document.getElementById('spotsCount');
                        select.innerHTML = '';
                        for (let i = 1; i <= left; i++) {
                            const opt = document.createElement('option');
                            opt.value = i;
                            opt.textContent = `${i} чел.`;
                            select.appendChild(opt);
                        }
                    });
                }
                wrapper.appendChild(btn);
            });

            if (visibleSlotsCount === 0) {
                wrapper.innerHTML = '<div style="grid-column: 1/-1; text-align:center; color:#ef4444; padding:10px; font-weight:700;">Нет доступных слотов на эту дату</div>';
                submitBtn.disabled = true;
            }
        }

        // Логика отправки формы (заглушка для структуры)
        async function handleBooking() {
            if (!selectedTime) { alert('Пожалуйста, выберите время сплава!'); return; }
            const spots = document.getElementById('spotsCount').value;
            if (!spots) { alert('Выберите количество человек!'); return; }
            
            // Твоя логика сохранения в Supabase и редиректа на Каспи...
            alert(`Отправляем бронь на время ${selectedTime}, мест: ${spots}`);
        }

        // Первый запуск при загрузке страницы
        renderSlots();
    </script>
</body>
</html>
