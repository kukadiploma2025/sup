<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUP CLUB ASTANA — Запись на городские сплавы</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --accent-yellow: #f59e0b;
            --accent-yellow-hover: #d97706;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-main); color: var(--text-main); padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: var(--bg-card); padding: 25px; border-radius: 24px; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: var(--accent-yellow); margin-bottom: 25px; font-weight: 800; }
        label { font-weight: 700; display: block; margin: 20px 0 8px; color: var(--text-muted); font-size: 13px; text-transform: uppercase; }
        select, input[type="date"], input[type="text"], input[type="tel"] { width: 100%; padding: 14px; border: 2px solid var(--border-color); border-radius: 14px; box-sizing: border-box; font-size: 16px; background: #151f32; color: var(--text-main); outline: none; }
        .route-card { border: 2px solid var(--border-color); border-radius: 16px; padding: 18px; margin-bottom: 15px; cursor: pointer; background: #151f32; transition: all 0.2s; }
        .route-card.active { border-color: var(--accent-yellow); background: rgba(245, 158, 11, 0.08); }
        .route-card.active strong { color: var(--accent-yellow); }
        .slots-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 5px; }
        .slot-btn { padding: 14px; text-align: center; border: 2px solid var(--border-color); border-radius: 14px; cursor: pointer; background: #151f32; font-weight: 600; }
        .slot-btn.active { background: var(--accent-yellow); color: #000; border-color: var(--accent-yellow); }
        .slot-btn.disabled { background: #0f172a; color: #475569; cursor: not-allowed; }
        .payment-group { display: flex; gap: 15px; }
        .payment-label { flex: 1; border: 2px solid var(--border-color); padding: 14px; border-radius: 14px; text-align: center; cursor: pointer; background: #151f32; }
        .payment-group input { display: none; }
        .payment-group input:checked + .payment-label { border-color: var(--accent-yellow); background: rgba(245, 158, 11, 0.1); color: var(--accent-yellow); }
        .btn-submit { width: 100%; background: var(--accent-yellow); color: #0f172a; border: none; padding: 16px; border-radius: 14px; font-size: 18px; font-weight: 800; margin-top: 20px; cursor: pointer; text-transform: uppercase; }
        .btn-submit:disabled { background: #334155; color: #475569; cursor: not-allowed; }
        .info-spots { display: block; font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        .sunday-alert { background: rgba(245, 158, 11, 0.05); border: 2px dashed var(--accent-yellow); padding: 20px; border-radius: 16px; text-align: center; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>SUP CLUB ASTANA | Запись</h2>

    <label>Ваше имя</label>
    <input type="text" id="clientName" placeholder="Имя">

    <label>Номер телефона</label>
    <input type="tel" id="clientPhone" placeholder="+7 (707) 123-45-67">

    <label>Дата</label>
    <input type="date" id="bookingDate">

    <div id="bookingFieldsContainer">
        <label>Маршрут</label>
        <div id="routeTuranAtyrau" class="route-card active" onclick="selectRoute('turan-atyrau')">
            <strong>Мост Туран — Атырауский мост</strong>
        </div>
        <div id="routeTuranAkorda" class="route-card" onclick="selectRoute('turan-akorda')">
            <strong>Мост Туран — Акорда (Утренний)</strong>
        </div>
    </div>

    <label>Доступное время</label>
    <div id="slotsWrapper" class="slots-container"></div>

    <label>Количество человек</label>
    <select id="spotsCount"><option value="1">1 чел.</option></select>

    <label>Способ оплаты</label>
    <div class="payment-group">
        <input type="radio" id="payKaspi" name="payment" value="Каспи" checked><label for="payKaspi" class="payment-label">Kaspi</label>
        <input type="radio" id="payCash" name="payment" value="Наличные"><label for="payCash" class="payment-label">Наличные</label>
    </div>

    <div id="sundayWrapper"></div>
    <button id="submitBtn" class="btn-submit" onclick="handleBooking()">Записаться</button>
</div>

<script>
    const BASE_SUPABASE_URL = 'https://ununcobobksowzkvbypf.supabase.co/rest/v1';
    const ANON_KEY = 'sb_publishable_G3mrUyo8-jeujpG_Cr56Ew_nHoYTxWN';

    let selectedRouteType = 'turan-atyrau';
    let selectedTime = '';
    let isSubmitting = false;

    // Инициализация даты
    const d = new Date();
    document.getElementById('bookingDate').value = d.toISOString().split('T')[0];

    function selectRoute(route) {
        selectedRouteType = route;
        selectedTime = '';
        document.getElementById('routeTuranAtyrau').classList.toggle('active', route === 'turan-atyrau');
        document.getElementById('routeTuranAkorda').classList.toggle('active', route === 'turan-akorda');
        renderSlots();
    }

    async function renderSlots() {
        const wrapper = document.getElementById('slotsWrapper');
        const dateInput = document.getElementById('bookingDate').value;
        const d = new Date(dateInput);
        const day = d.getDay(); // 0-Вс, 1-Пн, 2-Вт, 3-Ср, 4-Чт, 5-Пт, 6-Сб

        wrapper.innerHTML = '';
        let times = [];

        // Логика по дням недели
        if (selectedRouteType === 'turan-atyrau') {
            if (day === 1 || day === 5) { // Пн и Пт
                times = ['10:00', '13:00', '16:00', '18:00'];
            } else if (day === 6) { // В субботу Атырау закрыт
                wrapper.innerHTML = '<div style="color:red">Маршрут Атырау по субботам недоступен.</div>';
                return;
            } else {
                times = ['10:00', '13:00', '16:00', '18:00'];
            }
        } else { // Акорда
            if (day !== 6) {
                wrapper.innerHTML = '<div style="color:red">Маршрут Акорда доступен ТОЛЬКО в субботу.</div>';
                return;
            } else {
                times = ['06:00', '07:00', '08:00', '09:00', '13:00', '16:00', '18:00'];
            }
        }

        times.forEach(time => {
            const btn = document.createElement('div');
            btn.className = 'slot-btn';
            btn.innerHTML = `<strong>${time}</strong>`;
            btn.onclick = () => {
                document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedTime = time;
            };
            wrapper.appendChild(btn);
        });
    }

    async function handleBooking() {
        if (!selectedTime) return alert('Выберите время!');
        const name = document.getElementById('clientName').value;
        const phone = document.getElementById('clientPhone').value;
        const msg = `Запись: ${selectedRouteType}, ${document.getElementById('bookingDate').value}, ${selectedTime}. Имя: ${name}, Тел: ${phone}`;
        window.open(`https://wa.me/77479416498?text=${encodeURIComponent(msg)}`, '_blank');
    }

    document.getElementById('bookingDate').onchange = renderSlots;
    renderSlots();
</script>
</body>
</html>
