<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запись на SUP-сплав</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; color: #333; }
        .form-container { max-width: 500px; margin: 30px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #007bff; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .btn-submit { width: 100%; background-color: #007bff; color: white; border: none; padding: 12px; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-submit:hover { background-color: #0056b3; }
        .msg { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Запись на сплав</h2>
    <form id="bookingForm">
        <div class="form-group">
            <label for="customerName">Имя</label>
            <input type="text" id="customerName" required placeholder="Иван">
        </div>
        <div class="form-group">
            <label for="customerPhone">Телефон</label>
            <input type="tel" id="customerPhone" required placeholder="+7 (707) 123-4567">
        </div>
        <div class="form-group">
            <label for="bookingDate">Дата сплава</label>
            <input type="date" id="bookingDate" required>
        </div>
        <div class="form-group">
            <label for="promoCode">Сертификат / Купон (если есть)</label>
            <input type="text" id="promoCode" placeholder="Активация скрытых условий">
        </div>
        <div class="form-group">
            <label for="bookingTime">Время сплава</label>
            <select id="bookingTime" required></select>
        </div>
        <div class="form-group">
            <label for="spotsCount">Количество мест</label>
            <input type="number" id="spotsCount" min="1" max="20" value="1" required>
        </div>
        <div class="form-group">
            <label for="routeName">Маршрут</label>
            <select id="routeName">
                <option value="Центральный (Набережная)">Центральный (Набережная)</option>
                <option value="Загородный (Парк)">Загородный (Парк)</option>
            </select>
        </div>
        <button type="submit" class="btn-submit">Забронировать</button>
    </form>
    <div id="message" class="msg"></div>
</div>

<script>
    const API_URL = 'https://ununcobobksowzkvbypf.supabase.co/rest/v1/bookings';
    const ANON_KEY = 'sb_publishable_G3mrUyo8-jeujpG_Cr56Ew_nHoYTxWN';

    // Ограничиваем календарь: клиенты могут выбрать только сегодня и будущие даты
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    document.getElementById('bookingDate').min = `${yyyy}-${mm}-${dd}`;
    document.getElementById('bookingDate').value = `${yyyy}-${mm}-${dd}`;

    // Конфиг времени и секретных кодов к ним
    const timeSlots = [
        { time: '07:00', isSecret: true, code: 'утро7' },
        { time: '08:00', isSecret: true, code: 'утро8' },
        { time: '09:00', isSecret: true, code: 'утро9' },
        { time: '10:00', isSecret: false },
        { time: '13:00', isSecret: false },
        { time: '16:00', isSecret: false },
        { time: '18:00', isSecret: false }
    ];

    function updateTimeSlots() {
        const promoInput = document.getElementById('promoCode').value.trim().toLowerCase();
        const select = document.getElementById('bookingTime');
        select.innerHTML = '';

        timeSlots.forEach(slot => {
            if (!slot.isSecret || (slot.isSecret && promoInput === slot.code.toLowerCase())) {
                const opt = document.createElement('option');
                opt.value = slot.time;
                opt.textContent = slot.time + (slot.isSecret ? ' (Спец. время)' : '');
                select.appendChild(opt);
            }
        });
    }

    document.getElementById('promoCode').addEventListener('input', updateTimeSlots);
    updateTimeSlots(); // Инициализация при старте

    // Отправка данных формы в Supabase
    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msgDiv = document.getElementById('message');
        msgDiv.textContent = 'Оформление брони...';
        msgDiv.style.color = '#333';

        const bookingData = {
            customer_name: document.getElementById('customerName').value.trim(),
            customer_phone: document.getElementById('customerPhone').value.trim(),
            booking_date: document.getElementById('bookingDate').value,
            booking_time: document.getElementById('bookingTime').value,
            spots_count: parseInt(document.getElementById('spotsCount').value),
            route_name: document.getElementById('routeName').value,
            payment_status: 'Ожидает предоплаты' // По умолчанию для админки
        };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'apikey': ANON_KEY,
                    'Authorization': `Bearer ${ANON_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify(bookingData)
            });

            if (response.ok) {
                msgDiv.textContent = 'Успешно забронировано! Наш менеджер свяжется с вами.';
                msgDiv.style.color = 'green';
                document.getElementById('bookingForm').reset();
                updateTimeSlots();
            } else {
                msgDiv.textContent = 'Ошибка при бронировании. Попробуйте снова.';
                msgDiv.style.color = 'red';
            }
        } catch (err) {
            msgDiv.textContent = 'Ошибка сети. Проверьте подключение.';
            msgDiv.style.color = 'red';
        }
    });
</script>
</body>
</html>
