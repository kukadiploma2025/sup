<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUP CLUB ASTANA — Управление базой</title>
    <style>
        :root {
            --bg-main: #0a0f1d;
            --bg-card: #131a30;
            --accent-gold: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #243256;
            --danger: #ef4444;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-main); color: var(--text-main); padding: 20px; margin: 0; }
        .admin-container { max-width: 600px; margin: 0 auto; background: var(--bg-card); padding: 25px; border-radius: 24px; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-screen { max-width: 350px; margin: 100px auto; background: var(--bg-card); padding: 30px; border-radius: 24px; border: 1px solid var(--border-color); text-align: center; }
        h2, h3 { color: var(--accent-gold); margin-top: 0; font-weight: 800; text-align: center; }
        h3 { border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-top: 30px; text-align: left; }
        label { font-weight: 700; display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 13px; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; border: 2px solid var(--border-color); border-radius: 14px; box-sizing: border-box; font-size: 16px; background: #0a0f1d; color: var(--text-main); outline: none; margin-bottom: 20px; }
        input:focus, select:focus { border-color: var(--accent-gold); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        .block-form-group { display: flex; gap: 10px; margin-bottom: 25px; }
        .block-form-group select { margin-bottom: 0; flex: 2; }
        .btn-block { flex: 1; background: var(--danger); color: #fff; border: none; padding: 0 15px; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .btn-login { width: 100%; background: var(--accent-gold); color: #000; border: none; padding: 14px; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .item-card { background: #0a0f1d; border: 1px solid var(--border-color); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .item-info strong { color: var(--accent-gold); font-size: 17px; }
        .item-info p { margin: 5px 0 0 0; font-size: 14px; color: var(--text-muted); }
        .btn-delete { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); padding: 8px 14px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 13px; }
        .btn-delete:hover { background: var(--danger); color: #fff; }
        .empty-msg { text-align: center; color: var(--text-muted); padding: 20px; font-style: italic; }
    </style>
</head>
<body>

<!-- ОКНО АВТОРИЗАЦИИ -->
<div id="loginScreen" class="login-screen">
    <h2>Вход в панель</h2>
    <input type="text" id="username" placeholder="Логин">
    <input type="password" id="password" placeholder="Пароль">
    <button class="btn-login" onclick="checkLogin()">Войти</button>
</div>

<!-- ОСНОВНОЙ КОНТЕНТ АДМИНКИ -->
<div id="adminContent" class="admin-container" style="display: none;">
    <h2>SUP CLUB ASTANA <br><span style="font-size:14px; color:var(--text-muted); font-weight:400;">Управление Блокировками и Удалением</span></h2>

    <label for="filterDate">Выберите дату</label>
    <input type="date" id="filterDate" onchange="loadData()">

    <h3>Управление доступностью слотов</h3>
    <div class="block-form-group">
        <select id="timeToBlock">
            <option value="10:00">10:00 (Маршрут Атырау)</option>
            <option value="13:00">13:00 (Маршрут Атырау)</option>
            <option value="16:00">16:00 (Маршрут Атырау)</option>
            <option value="18:00">18:00 (Маршрут Атырау)</option>
            <option value="06:00">06:00 (Маршрут Акорда)</option>
            <option value="ALL">Закрыть весь день целиком</option>
        </select>
        <button class="btn-block" onclick="blockSlot()">Блок</button>
    </div>

    <h3>Записи клиентов на этот день</h3>
    <div id="bookingsList"></div>

    <h3>Заблокированное время</h3>
    <div id="blocksList"></div>
</div>

<script>
    const BASE_SUPABASE_URL = 'https://ununcobobksowzkvbypf.supabase.co/rest/v1';
    const ANON_KEY = 'sb_publishable_G3mrUyo8-jeujpG_Cr56Ew_nHoYTxWN';
    const headers = { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}`, 'Content-Type': 'application/json' };

    const today = new Date();
    document.getElementById('filterDate').value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

    // Безопасная проверка через сервер Supabase RPC
    async function checkLogin() {
        const user = document.getElementById('username').value.trim().toLowerCase();
        const pass = document.getElementById('password').value.trim();

        try {
            const response = await fetch(`${BASE_SUPABASE_URL}/rpc/check_admin_login`, {
                method: 'POST',
                headers,
                body: JSON.stringify({ p_user: user, p_pass: pass })
            });

            const isValid = await response.json();

            if (isValid === true) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadData();
            } else {
                alert('Неверный логин или пароль!');
            }
        } catch (e) {
            alert('Ошибка авторизации. Проверьте настройки SQL в Supabase.');
        }
    }

    async function loadData() {
        const dateInput = document.getElementById('filterDate').value;
        if (!dateInput || document.getElementById('adminContent').style.display === 'none') return;

        const bList = document.getElementById('bookingsList');
        const blList = document.getElementById('blocksList');
        
        bList.innerHTML = '<div class="empty-msg">Загрузка броней...</div>';
        blList.innerHTML = '<div class="empty-msg">Загрузка блокировок...</div>';

        try {
            const [resBookings, resBlocks] = await Promise.all([
                fetch(`${BASE_SUPABASE_URL}/bookings?booking_date=eq.${dateInput}&order=booking_time.asc`, { method: 'GET', headers }),
                fetch(`${BASE_SUPABASE_URL}/blocked_slots?block_date=eq.${dateInput}`, { method: 'GET', headers })
            ]);

            const bookings = resBookings.ok ? await resBookings.json() : [];
            const blocks = resBlocks.ok ? await resBlocks.json() : [];

            if (bookings.length === 0) {
                bList.innerHTML = '<div class="empty-msg">Нет записей</div>';
            } else {
                bList.innerHTML = '';
                bookings.forEach(b => {
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.innerHTML = `
                        <div class="item-info">
                            <strong>[${b.booking_time}] — ${b.spots_count} чел.</strong>
                            <p>${b.customer_name} (${b.customer_phone})</p>
                        </div>
                        <button class="btn-delete" onclick="deleteBooking(${b.id})">Удалить</button>
                    `;
                    bList.appendChild(card);
                });
            }

            if (blocks.length === 0) {
                blList.innerHTML = '<div class="empty-msg">Нет блокировок</div>';
            } else {
                blList.innerHTML = '';
                blocks.forEach(b => {
                    const cleanTime = b.slot_time.replace(/[\[\]\s]/g, '');
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.innerHTML = `
                        <div class="item-info">
                            <strong style="color:var(--danger)">🛑 Блок: ${cleanTime === 'ALL' ? 'ВЕСЬ ДЕНЬ' : cleanTime}</strong>
                        </div>
                        <button class="btn-delete" onclick="deleteBlock(${b.id})">Снять блок</button>
                    `;
                    blList.appendChild(card);
                });
            }
        } catch (e) { console.error(e); }
    }

    async function blockSlot() {
        const dateInput = document.getElementById('filterDate').value;
        const timeInput = document.getElementById('timeToBlock').value;
        if (!dateInput) return;

        try {
            await fetch(`${BASE_SUPABASE_URL}/blocked_slots`, {
                method: 'POST',
                headers: { ...headers, 'Prefer': 'return=minimal' },
                body: JSON.stringify({ block_date: dateInput, slot_time: timeInput })
            });
            loadData();
        } catch (e) { alert(e.message); }
    }

    async function deleteBlock(id) {
        if (!confirm('Снять блокировку времени?')) return;
        try {
            await fetch(`${BASE_SUPABASE_URL}/blocked_slots?id=eq.${id}`, { method: 'DELETE', headers });
            loadData();
        } catch (e) { alert(e.message); }
    }

    async function deleteBooking(id) {
        if (!confirm('Удалить бронь клиента навсегда?')) return;
        try {
            await fetch(`${BASE_SUPABASE_URL}/bookings?id=eq.${id}`, { method: 'DELETE', headers });
            loadData();
        } catch (e) { alert(e.message); }
    }
</script>
</body>
</html>
