<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления — SUP CLUB ASTANA</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --accent-yellow: #f59e0b;
            --accent-red: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --accent-green: #10b981;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            padding: 30px 15px;
            margin: 0;
        }
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            display: none;
        }
        
        /* Стили формы логина */
        .login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-main);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .login-box {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        .login-box h2 { color: var(--accent-yellow); margin-top: 0; margin-bottom: 20px; }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #151f32;
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .btn-login {
            width: 100%;
            background: var(--accent-yellow);
            color: #0f172a;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-login:hover { opacity: 0.9; }

        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
        }
        h1 { color: var(--accent-yellow); margin: 0; font-size: 28px; }
        .controls-group { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .filter-group { display: flex; align-items: center; gap: 10px; }
        input[type="date"], select {
            padding: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 8px;
            font-size: 16px;
        }
        .btn-danger {
            background: var(--accent-red);
            color: #fff;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: opacity 0.2s;
        }
        .btn-danger:hover { opacity: 0.9; }

        .btn-secondary {
            background: #475569;
            color: #fff;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent-yellow);
            margin-top: 5px;
        }
        .stat-card .label { color: var(--text-muted); font-size: 13px; }
        
        .booking-table-wrapper {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 1100px;
        }
        th, td { padding: 14px 16px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        th { color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        tr:last-child td { border-bottom: none; }

        /* Стиль для выполненной (вычеркнутой) записи */
        tr.row-completed {
            opacity: 0.4;
        }
        tr.row-completed td:not(:last-child) {
            text-decoration: line-through;
            text-decoration-color: var(--accent-yellow);
        }
        
        .note-input, .prepay-input {
            background: #151f32;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 10px;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            font-size: 14px;
        }
        .prepay-input { width: 90px; text-align: center; }
        
        .checkbox-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .checkbox-container input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--accent-yellow);
        }
        
        .action-btns {
            display: flex;
            gap: 6px;
            flex-wrap: nowrap;
        }
        .btn-save {
            background: var(--accent-yellow);
            color: #0f172a;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        .btn-save:hover { opacity: 0.9; }

        .btn-complete-row {
            background: #1e293b;
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        .btn-complete-row.active {
            background: var(--accent-green);
            color: #fff;
        }

        .btn-delete-row {
            background: #343a40;
            color: #ff4d4d;
            border: 1px solid #495057;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn-delete-row:hover { 
            background: var(--accent-red); 
            color: #fff;
            border-color: var(--accent-red);
        }

        .badge-rest { font-weight: bold; color: #f43f5e; }
        .badge-done { font-weight: bold; color: #10b981; }

        .wa-link {
            color: #25d366;
            text-decoration: none;
            font-weight: bold;
        }
        .wa-link:hover { text-decoration: underline; }

        /* Секретная панель выходных */
        .weekend-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            display: none;
        }
    </style>
</head>
<body>

<!-- Окно авторизации -->
<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <h2>Вход в панель</h2>
        <input type="text" id="username" placeholder="Логин">
        <input type="password" id="password" placeholder="Пароль">
        <button class="btn-login" onclick="checkAuth()">Войти</button>
    </div>
</div>

<!-- Контент админки -->
<div class="admin-container" id="adminContainer">
    <div class="header-panel">
        <h1>SUP CLUB ASTANA | Управление</h1>
        <div class="controls-group">
            <button class="btn-secondary" onclick="toggleWeekendPanel()">Настройка выходных</button>
            <div class="filter-group">
                <label style="color: var(--text-muted)">Дата отчета: </label>
                <input type="date" id="adminDate" onchange="loadAdminData()">
            </div>
            <button class="btn-danger" onclick="clearDatabaseWithCode()">Очистить всю базу</button>
        </div>
    </div>

    <!-- Скрытая панель блокировки дат (Беспалевные выходные) -->
    <div class="weekend-panel" id="weekendPanel">
        <h3 style="color: var(--accent-yellow); margin-top: 0;">Управление закрытыми датами / часами</h3>
        <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
            <input type="date" id="blockDate">
            <select id="blockTime">
                <option value="ALL">ВСЕ СЛОТЫ (Весь день)</option>
                <option value="06:00">06:00</option>
                <option value="08:00">08:00</option>
                <option value="10:00">10:00</option>
                <option value="12:00">12:00</option>
                <option value="14:00">14:00</option>
                <option value="16:00">16:00</option>
                <option value="18:00">18:00</option>
                <option value="20:00">20:00</option>
            </select>
            <button class="btn-save" onclick="addDisabledSlot()">Заблокировать</button>
        </div>
        <div id="disabledSlotsList" style="margin-top: 15px; font-size: 14px; color: var(--text-muted);">
            <!-- Список заблоченных дней -->
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="label">Всего человек</div>
            <div id="totalPeople" class="value">0</div>
        </div>
        <div class="stat-card">
            <div class="label">Общий чек (Ожидание)</div>
            <div id="totalSum" class="value">0 ₸</div>
        </div>
        <div class="stat-card">
            <div class="label">Собрано предоплат</div>
            <div id="totalPrepaid" class="value">0 ₸</div>
        </div>
        <div class="stat-card">
            <div class="label">Осталось собрать</div>
            <div id="totalRemaining" class="value">0 ₸</div>
        </div>
    </div>

    <div class="booking-table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Время</th>
                    <th>Клиент</th>
                    <th>Маршрут</th>
                    <th style="text-align:center;">Места</th>
                    <th>Общий чек</th>
                    <th style="text-align:center;">Внесена?</th>
                    <th>Сумма предоплаты</th>
                    <th>Остаток на пирсе</th>
                    <th>Особые отметки / Коммент</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
                <!-- Строки данных -->
            </tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = 'https://ununcobobksowzkvbypf.supabase.co/rest/v1/bookings';
    const ANON_KEY = 'sb_publishable_G3mrUyo8-jeujpG_Cr56Ew_nHoYTxWN';
    
    const DELETE_SECURITY_CODE = '123';
    const AUTH_LOGIN = 'admin';
    const AUTH_PASS = 'supastana2026';

    function checkAuth() {
        const userInp = document.getElementById('username').value.trim();
        const passInp = document.getElementById('password').value.trim();

        if (userInp === AUTH_LOGIN && passInp === AUTH_PASS) {
            sessionStorage.setItem('sup_authenticated', 'true');
            initAdmin();
        } else {
            alert('Неверный логин или пароль!');
        }
    }

    window.onload = function() {
        if (sessionStorage.getItem('sup_authenticated') === 'true') {
            initAdmin();
        }
    }

    function initAdmin() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('adminContainer').style.display = 'block';
        
        const today = new Date();
        document.getElementById('adminDate').value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        
        loadAdminData();
        renderDisabledSlots();
    }

    // Логика секретных выходных дней (без палева в общем коде)
    function toggleWeekendPanel() {
        const panel = document.getElementById('weekendPanel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function addDisabledSlot() {
        const dateVal = document.getElementById('blockDate').value;
        const timeVal = document.getElementById('blockTime').value;
        if (!dateVal) return alert('Выберите дату');

        let currentSlots = JSON.parse(localStorage.getItem('sup_disabled_slots')) || [];
        currentSlots.push({ date: dateVal, time: timeVal });
        localStorage.setItem('sup_disabled_slots', JSON.stringify(currentSlots));
        
        renderDisabledSlots();
    }

    function removeDisabledSlot(index) {
        let currentSlots = JSON.parse(localStorage.getItem('sup_disabled_slots')) || [];
        currentSlots.splice(index, 1);
        localStorage.setItem('sup_disabled_slots', JSON.stringify(currentSlots));
        renderDisabledSlots();
    }

    function renderDisabledSlots() {
        const container = document.getElementById('disabledSlotsList');
        let currentSlots = JSON.parse(localStorage.getItem('sup_disabled_slots')) || [];
        if (currentSlots.length === 0) {
            container.innerHTML = 'Нет заблокированных дат.';
            return;
        }
        container.innerHTML = '<strong>Заблокировано:</strong><br>' + currentSlots.map((s, idx) => 
            `• ${s.date} [${s.time === 'ALL' ? 'Весь день' : s.time}] <button onclick="removeDisabledSlot(${idx})" style="background:none; border:none; color:red; cursor:pointer; padding:0 5px;">[Удалить]</button>`
        ).join('<br>');
    }

    async function loadAdminData() {
        if (sessionStorage.getItem('sup_authenticated') !== 'true') return;

        const selectedDate = document.getElementById('adminDate').value;
        const tbody = document.getElementById('adminTableBody');
        tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; color: var(--text-muted); padding: 25px;">Загрузка списка бронирований...</td></tr>';

        try {
            const response = await fetch(`${API_URL}?booking_date=eq.${selectedDate}&order=booking_time.asc`, {
                method: 'GET',
                headers: {
                    'apikey': ANON_KEY,
                    'Authorization': `Bearer ${ANON_KEY}`,
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) throw new Error('Не удалось прочитать таблицы Supabase.');
            const data = await response.json();

            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; color: var(--text-muted); padding: 25px;">На эти сутки записей нет. База чиста.</td></tr>';
                document.getElementById('totalPeople').textContent = '0';
                document.getElementById('totalSum').textContent = '0 ₸';
                document.getElementById('totalPrepaid').textContent = '0 ₸';
                document.getElementById('totalRemaining').textContent = '0 ₸';
                return;
            }

            let globalPeople = 0;
            let globalSum = 0;
            let globalPrepaid = 0;
            let globalRemaining = 0;

            data.forEach(item => {
                const totalCost = item.spots_count * 10000;
                
                let prepayCash = parseFloat(item.payment_method) || 0;
                if (isNaN(prepayCash)) prepayCash = 0; 
                
                const restCost = totalCost - prepayCash;
                const isPaid = item.notes && item.notes.includes('[PAID]');
                const isCompleted = item.notes && item.notes.includes('[COMPLETED]');
                
                let cleanNotes = item.notes ? item.notes.replace('[PAID]', '').replace('[COMPLETED]', '').trim() : '';

                globalPeople += item.spots_count;
                globalSum += totalCost;
                globalPrepaid += prepayCash;
                globalRemaining += restCost;

                // Генерация времени создания (Timestamp)
                let createdAtStr = '—';
                if (item.created_at) {
                    const cDate = new Date(item.created_at);
                    createdAtStr = `${String(cDate.getDate()).padStart(2, '0')}.${String(cDate.getMonth() + 1).padStart(2, '0')} в ${String(cDate.getHours()).padStart(2, '0')}:${String(cDate.getMinutes()).padStart(2, '0')}`;
                }

                // Шаблон автоматического сообщения в WhatsApp
                const rawPhone = item.customer_phone.replace(/\D/g, '');
                const waMessage = encodeURIComponent(
                    `На связи инструктор SUP.CLUB.ASTANA, Меня зовут Қуаныш.\n\n` +
                    `Вижу вашу бронь на ${item.booking_date} в ${item.booking_time} на городской сплав на сапбордах.\n\n` +
                    `Чтобы подтвердить бронирование, необходимо внести предоплату 50%. Это позволит нам заранее подготовить всё необходимое к вашему приезду.\n\n` +
                    `Обратите внимание: при отмене бронирования или неявке менее чем за 2 часов до начала сплава предоплата не возвращается.\n\n` +
                    `После оплаты отправьте, пожалуйста, чек в ответ на это сообщение. До встречи на воде! 🌊`
                );
                const waUrl = `https://wa.me/${rawPhone}?text=${waMessage}`;

                const tr = document.createElement('tr');
                if (isCompleted) tr.classList.add('row-completed');

                tr.innerHTML = `
                    <td style="font-weight:bold; color:var(--accent-yellow); font-size:16px;">${item.booking_time}</td>
                    <td>
                        <strong>${item.customer_name}</strong><br>
                        <a href="${waUrl}" target="_blank" class="wa-link" title="Написать в WhatsApp">📱 ${item.customer_phone}</a><br>
                        <span style="font-size:11px; color:var(--text-muted);">Создано: ${createdAtStr}</span>
                    </td>
                    <td style="font-size:13px; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${item.route_name}</td>
                    <td style="font-weight:bold; text-align:center; font-size:16px;">${item.spots_count}</td>
                    <td style="font-weight:bold; color:var(--text-main);">${totalCost.toLocaleString()} ₸</td>
                    <td class="checkbox-container">
                        <input type="checkbox" id="check-${item.id}" ${isPaid ? 'checked' : ''}>
                    </td>
                    <td>
                        <input type="number" class="prepay-input" id="prepay-${item.id}" value="${prepayCash || ''}" placeholder="0" oninput="calculateRowLive(${item.id}, ${totalCost})"> ₸
                    </td>
                    <td>
                        <span id="rest-${item.id}" class="${restCost <= 0 ? 'badge-done' : 'badge-rest'}">${restCost.toLocaleString()} ₸</span>
                    </td>
                    <td>
                        <input type="text" class="note-input" id="note-${item.id}" value="${cleanNotes}" placeholder="Особые отметки">
                    </td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-save" onclick="saveAdminRow(${item.id})">Сохранить</button>
                            <button class="btn-complete-row ${isCompleted ? 'active' : ''}" onclick="toggleCompleteRow(${item.id}, ${isCompleted})">${isCompleted ? '↩️' : '✅'}</button>
                            <button class="btn-delete-row" onclick="deleteAdminRow(${item.id}, '${item.customer_name.replace(/'/g, "\\'")}')">Удалить</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('totalPeople').textContent = globalPeople;
            document.getElementById('totalSum').textContent = globalSum.toLocaleString() + ' ₸';
            document.getElementById('totalPrepaid').textContent = globalPrepaid.toLocaleString() + ' ₸';
            document.getElementById('totalRemaining').textContent = globalRemaining.toLocaleString() + ' ₸';

        } catch (e) {
            tbody.innerHTML = `<tr><td colspan="10" style="text-align:center; color:#ef4444; padding: 25px;">Ошибка связи: ${e.message}</td></tr>`;
        }
    }

    function calculateRowLive(id, totalCost) {
        const prepayInput = document.getElementById(`prepay-${id}`).value;
        const prepayValue = parseFloat(prepayInput) || 0;
        const restContainer = document.getElementById(`rest-${id}`);
        const currentRest = totalCost - prepayValue;
        
        restContainer.textContent = currentRest.toLocaleString() + ' ₸';
        restContainer.className = currentRest <= 0 ? 'badge-done' : 'badge-rest';
    }

    async function saveAdminRow(id) {
        const isChecked = document.getElementById(`check-${id}`).checked;
        const isCompleted = document.getElementById(`note-${id}`).parentNode.parentNode.classList.contains('row-completed');
        const prepayValue = document.getElementById(`prepay-${id}`).value.trim();
        let noteValue = document.getElementById(`note-${id}`).value.trim();

        if (isChecked) noteValue = '[PAID] ' + noteValue;
        if (isCompleted) noteValue = '[COMPLETED] ' + noteValue;

        try {
            const response = await fetch(`${API_URL}?id=eq.${id}`, {
                method: 'PATCH',
                headers: {
                    'apikey': ANON_KEY,
                    'Authorization': `Bearer ${ANON_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({ payment_method: prepayValue, notes: noteValue })
            });

            if (response.ok) loadAdminData();
            else alert('Не удалось update данные в Supabase.');
        } catch (e) {
            alert('Сбой сети при сохранении: ' + e.message);
        }
    }

    // Переключение статуса Выполнено/Вычеркнуто
    async function toggleCompleteRow(id, currentlyCompleted) {
        const isChecked = document.getElementById(`check-${id}`).checked;
        const prepayValue = document.getElementById(`prepay-${id}`).value.trim();
        let noteValue = document.getElementById(`note-${id}`).value.trim();

        if (isChecked) noteValue = '[PAID] ' + noteValue;
        
        // Меняем статус наоборот
        if (!currentlyCompleted) {
            noteValue = '[COMPLETED] ' + noteValue;
        }

        try {
            const response = await fetch(`${API_URL}?id=eq.${id}`, {
                method: 'PATCH',
                headers: {
                    'apikey': ANON_KEY,
                    'Authorization': `Bearer ${ANON_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ notes: noteValue })
            });

            if (response.ok) loadAdminData();
        } catch (e) {
            alert('Ошибка изменения статуса выполнения: ' + e.message);
        }
    }

    async function deleteAdminRow(id, name) {
        const confirmDelete = confirm(`Вы действительно хотите удалить бронирование на имя "${name}"?`);
        if (!confirmDelete) return;

        try {
            const response = await fetch(`${API_URL}?id=eq.${id}`, {
                method: 'DELETE',
                headers: {
                    'apikey': ANON_KEY,
                    'Authorization': `Bearer ${ANON_KEY}`,
                    'Content-Type': 'application/json'
                }
            });

            if (response.ok) {
                loadAdminData();
            } else {
                alert('Не удалось удалить запись.');
            }
        } catch (e) {
            alert('Сбой сети при удалении записи: ' + e.message);
        }
    }

    async function clearDatabaseWithCode() {
        const code = prompt('ВНИМАНИЕ! Вы собираетесь очистить ВСЮ базу данных бронирований.\nДля подтверждения введите секретный код удаления:');
        if (code === null) return; 
        if (code !== DELETE_SECURITY_CODE) {
            alert('Неверный код безопасности! Действие заблокировано.');
            return;
        }

        const finalConfirm = confirm('Вы уверены? Это действие сотрет ВСЕ записи навсегда!');
        if (!finalConfirm) return;

        try {
            const response = await fetch(`${API_URL}?id=neq.0`, {
                method: 'DELETE',
                headers: {
                    'apikey': ANON_KEY,
                    'Authorization': `Bearer ${ANON_KEY}`,
                    'Content-Type': 'application/json'
                }
            });

            if (response.ok) {
                alert('База данных успешно очищена!');
                loadAdminData();
            } else {
                alert('Ошибка при очистке.');
            }
        } catch (e) {
            alert('Критическая ошибка удаления: ' + e.message);
        }
    }
</script>
