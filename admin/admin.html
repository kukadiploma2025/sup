<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления — SUP CLUB ASTANA</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --accent-yellow: #f59e0b;
            --accent-red: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            padding: 30px 15px;
            margin: 0;
        }
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            display: none; /* Скрыто до успешного ввода пароля */
        }
        
        /* Стили формы логина */
        .login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-main);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .login-box {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        .login-box h2 { color: var(--accent-yellow); margin-top: 0; margin-bottom: 20px; }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #151f32;
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .btn-login {
            width: 100%;
            background: var(--accent-yellow);
            color: #0f172a;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-login:hover { opacity: 0.9; }

        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
        }
        h1 { color: var(--accent-yellow); margin: 0; font-size: 28px; }
        .controls-group { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .filter-group { display: flex; align-items: center; gap: 10px; }
        input[type="date"] {
            padding: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 8px;
            font-size: 16px;
        }
        .btn-danger {
            background: var(--accent-red);
            color: #fff;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: opacity 0.2s;
        }
        .btn-danger:hover { opacity: 0.9; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent-yellow);
            margin-top: 5px;
        }
        .stat-card .label { color: var(--text-muted); font-size: 13px; }
        
        .booking-table-wrapper {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 1000px;
        }
        th, td { padding: 14px 16px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        th { color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        tr:last-child td { border-bottom: none; }
        
        .note-input, .prepay-input {
            background: #151f32;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 10px;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            font-size: 14px;
        }
        .prepay-input { width: 90px; text-align: center; }
        
        .checkbox-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .checkbox-container input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--accent-yellow);
        }
        
        .btn-save {
            background: var(--accent-yellow);
            color: #0f172a;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        .btn-save:hover { opacity: 0.9; }
        .badge-rest { font-weight: bold; color: #f43f5e; }
        .badge-done { font-weight: bold; color: #10b981; }
    </style>
</head>
<body>

<!-- Окно авторизации -->
<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <h2>Вход в панель</h2>
        <input type="text" id="username" placeholder="Логин">
        <input type="password" id="password" placeholder="Пароль">
        <button class="btn-login" onclick="checkAuth()">Войти</button>
    </div>
</div>

<!-- Контент админки (откроется после ввода верных данных) -->
<div class="admin-container" id="adminContainer">
    <div class="header-panel">
        <h1>SUP CLUB ASTANA | Управление</h1>
        <div class="controls-group">
            <div class="filter-group">
                <label style="color: var(--text-muted)">Дата отчета (00:00 - 23:59): </label>
                <input type="date" id="adminDate" onchange="loadAdminData()">
            </div>
            <button class="btn-danger" onclick="clearDatabaseWithCode()">Очистить базу данных</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="label">Всего человек</div>
            <div id="totalPeople" class="value">0</div>
        </div>
        <div class="stat-card">
            <div class="label">Общий чек (Ожидание)</div>
            <div id="totalSum" class="value">0 ₸</div>
        </div>
        <div class="stat-card">
            <div class="label">Собрано предоплат</div>
            <div id="totalPrepaid" class="value">0 ₸</div>
        </div>
        <div class="stat-card">
            <div class="label">Осталось собрать</div>
            <div id="totalRemaining" class="value">0 ₸</div>
        </div>
    </div>

    <div class="booking-table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Время</th>
                    <th>Клиент</th>
                    <th>Маршрут</th>
                    <th style="text-align:center;">Места</th>
                    <th>Общий чек</th>
                    <th style="text-align:center;">Внесена?</th>
                    <th>Сумма предоплаты</th>
                    <th>Остаток на пирсе</th>
                    <th>Особые отметки / Коммент</th>
                    <th>Действие</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
                <!-- Строки данных -->
            </tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = 'https://ununcobobksowzkvbypf.supabase.co/rest/v1/bookings';
    const ANON_KEY = 'sb_publishable_G3mrUyo8-jeujpG_Cr56Ew_nHoYTxWN';
    
    const DELETE_SECURITY_CODE = '123';

    // НАСТРОЙКА ДОСТУПА В АДМИНКУ
    const AUTH_LOGIN = 'admin';
    const AUTH_PASS = 'supastana2026';

    // Функция проверки пароля
    function checkAuth() {
        const userInp = document.getElementById('username').value.trim();
        const passInp = document.getElementById('password').value.trim();

        if (userInp === AUTH_LOGIN && passInp === AUTH_PASS) {
            // Сохраняем сессию в браузере, чтобы не вводить пароль при каждой перезагрузке
            sessionStorage.setItem('sup_authenticated', 'true');
            initAdmin();
        } else {
            alert('Неверный логин или пароль!');
        }
    }

    // Проверка, авторизован ли уже пользователь ранее
    window.onload = function() {
        if (sessionStorage.getItem('sup_authenticated') === 'true') {
            initAdmin();
        }
    }

    function initAdmin() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('adminContainer').style.display = 'block';
        
        // Автоматическая установка сегодняшнего дня
        const today = new Date();
        document.getElementById('adminDate').value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        
        loadAdminData();
    }

    async function loadAdminData() {
        if (sessionStorage.getItem('sup_authenticated') !== 'true') return;

        const selectedDate = document.getElementById('adminDate').value;
        const tbody = document.getElementById('adminTableBody');
        tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; color: var(--text-muted); padding: 25px;">Загрузка списка бронирований за день...</td></tr>';

        try {
            const response = await fetch(`${API_URL}?booking_date=eq.${selectedDate}&order=booking_time.asc`, {
                method: 'GET',
                headers: {
                    'apikey': ANON_KEY,
                    'Authorization': `Bearer ${ANON_KEY}`,
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) throw new Error('Не удалось прочитать таблицы Supabase.');
            const data = await response.json();

            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; color: var(--text-muted); padding: 25px;">На эти сутки записей нет. База чиста.</td></tr>';
                document.getElementById('totalPeople').textContent = '0';
                document.getElementById('totalSum').textContent = '0 ₸';
                document.getElementById('totalPrepaid').textContent = '0 ₸';
                document.getElementById('totalRemaining').textContent = '0 ₸';
                return;
            }

            let globalPeople = 0;
            let globalSum = 0;
            let globalPrepaid = 0;
            let globalRemaining = 0;

            data.forEach(item => {
                const totalCost = item.spots_count * 10000;
                
                let prepayCash = parseFloat(item.payment_method) || 0;
                if (isNaN(prepayCash)) prepayCash = 0; 
                
                const restCost = totalCost - prepayCash;
                const isPaid = item.notes && item.notes.includes('[PAID]');
                const cleanNotes = item.notes ? item.notes.replace('[PAID]', '').trim() : '';

                globalPeople += item.spots_count;
                globalSum += totalCost;
                globalPrepaid += prepayCash;
                globalRemaining += restCost;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight:bold; color:var(--accent-yellow); font-size:16px;">${item.booking_time}</td>
                    <td>
                        <strong>${item.customer_name}</strong><br>
                        <span style="font-size:12px; color:var(--text-muted);">${item.customer_phone}</span>
                    </td>
                    <td style="font-size:13px; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${item.route_name}</td>
                    <td style="font-weight:bold; text-align:center; font-size:16px;">${item.spots_count}</td>
                    <td style="font-weight:bold; color:var(--text-main);">${totalCost.toLocaleString()} ₸</td>
                    <td class="checkbox-container">
                        <input type="checkbox" id="check-${item.id}" ${isPaid ? 'checked' : ''}>
                    </td>
                    <td>
                        <input type="number" class="prepay-input" id="prepay-${item.id}" value="${prepayCash || ''}" placeholder="0" oninput="calculateRowLive(${item.id}, ${totalCost})"> ₸
                    </td>
                    <td>
                        <span id="rest-${item.id}" class="${restCost <= 0 ? 'badge-done' : 'badge-rest'}">${restCost.toLocaleString()} ₸</span>
                    </td>
                    <td>
                        <input type="text" class="note-input" id="note-${item.id}" value="${cleanNotes}" placeholder="Особые отметки">
                    </td>
                    <td>
                        <button class="btn-save" onclick="saveAdminRow(${item.id})">Сохранить</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('totalPeople').textContent = globalPeople;
            document.getElementById('totalSum').textContent = globalSum.toLocaleString() + ' ₸';
            document.getElementById('totalPrepaid').textContent = globalPrepaid.toLocaleString() + ' ₸';
            document.getElementById('totalRemaining').textContent = globalRemaining.toLocaleString() + ' ₸';

        } catch (e) {
            tbody.innerHTML = `<tr><td colspan="10" style="text-align:center; color:#ef4444; padding: 25px;">Ошибка связи: ${e.message}</td></tr>`;
        }
    }

    function calculateRowLive(id, totalCost) {
        const prepayInput = document.getElementById(`prepay-${id}`).value;
        const prepayValue = parseFloat(prepayInput) || 0;
        const restContainer = document.getElementById(`rest-${id}`);
        const currentRest = totalCost - prepayValue;
        
        restContainer.textContent = currentRest.toLocaleString() + ' ₸';
        if (currentRest <= 0) {
            restContainer.className = 'badge-done';
        } else {
            restContainer.className = 'badge-rest';
        }
    }

    async function saveAdminRow(id) {
        const isChecked = document.getElementById(`check-${id}`).checked;
        const prepayValue = document.getElementById(`prepay-${id}`).value.trim();
        let noteValue = document.getElementById(`note-${id}`).value.trim();

        if (isChecked) {
            noteValue = '[PAID] ' + noteValue;
        }

        try {
            const response = await fetch(`${API_URL}?id=eq.${id}`, {
                method: 'PATCH',
                headers: {
                    'apikey': ANON_KEY,
                    'Authorization': `Bearer ${ANON_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({
                    payment_method: prepayValue,
                    notes: noteValue
                })
            });

            if (response.ok) {
                loadAdminData();
            } else {
                alert('Не удалось обновить ячейки в Supabase.');
            }
        } catch (e) {
            alert('Сбой сети при сохранении: ' + e.message);
        }
    }

    async function clearDatabaseWithCode() {
        const code = prompt('ВНИМАНИЕ! Вы собираетесь очистить ВСЮ базу данных бронирований.\nДля подтверждения введите секретный код удаления:');
        
        if (code === null) return; 
        
        if (code !== DELETE_SECURITY_CODE) {
            alert('Неверный код безопасности! Действие заблокировано.');
            return;
        }

        const finalConfirm = confirm('Вы уверены? Это действие сотрет ВСЕ записи навсегда без возможности восстановления!');
        if (!finalConfirm) return;

        try {
            const response = await fetch(`${API_URL}?id=neq.0`, {
                method: 'DELETE',
                headers: {
                    'apikey': ANON_KEY,
                    'Authorization': `Bearer ${ANON_KEY}`,
                    'Content-Type': 'application/json'
                }
            });

            if (response.ok) {
                alert('База данных успешно и полностью очищена!');
                loadAdminData();
            } else {
                alert('Ошибка при очистке. Проверьте права доступа RLS в панели Supabase.');
            }
        } catch (e) {
            alert('Критическая ошибка удаления: ' + e.message);
        }
    }
</script>
</body>
</html>
