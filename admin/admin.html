<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления — SUP CLUB ASTANA</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --accent-yellow: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            padding: 30px 15px;
            margin: 0;
        }
        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
        }
        h1 { color: var(--accent-yellow); margin: 0; font-size: 28px; }
        .filter-group { display: flex; align-items: center; gap: 10px; }
        input[type="date"] {
            padding: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 8px;
            font-size: 16px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: 800;
            color: var(--accent-yellow);
            margin-top: 5px;
        }
        .stat-card .label { color: var(--text-muted); font-size: 14px; }
        
        .booking-table-wrapper {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 800px;
        }
        th, td { padding: 14px 18px; border-bottom: 1px solid var(--border-color); }
        th { color: var(--text-muted); font-size: 13px; text-transform: uppercase; }
        tr:last-child td { border-bottom: none; }
        
        .note-input, .prepay-input {
            background: #151f32;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 10px;
            border-radius: 6px;
            width: 90%;
            font-size: 14px;
        }
        .btn-save {
            background: var(--accent-yellow);
            color: #0f172a;
            border: none;
            padding: 7px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        .btn-save:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-panel">
        <h1>SUP CLUB ASTANA | Администратор</h1>
        <div class="filter-group">
            <label style="color: var(--text-muted)">Выбрать день отчета: </label>
            <input type="date" id="adminDate" onchange="loadAdminData()">
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="label">Отработано человек за день</div>
            <div id="totalPeople" class="value">0</div>
        </div>
        <div class="stat-card">
            <div class="label">Ожидаемая касса (общая сумма)</div>
            <div id="totalSum" class="value">0 ₸</div>
        </div>
        <div class="stat-card">
            <div class="label">Заявок на дату</div>
            <div id="totalCount" class="value">0</div>
        </div>
    </div>

    <div class="booking-table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Время</th>
                    <th>ФИО Клиента</th>
                    <th>Направление</th>
                    <th>Кол-во мест</th>
                    <th>Чек за тур</th>
                    <th>Предоплата / Способ</th>
                    <th>Особые отметки (Заметки)</th>
                    <th>Действие</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
                <!-- Отрисовка динамических данных -->
            </tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = 'https://ununcobobksowzkvbypf.supabase.co/rest/v1/bookings';
    const ANON_KEY = 'sb_publishable_G3mrUyo8-jeujpG_Cr56Ew_nHoYTxWN';

    // Фильтр по умолчанию на текущие сутки
    const today = new Date();
    document.getElementById('adminDate').value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

    async function loadAdminData() {
        const selectedDate = document.getElementById('adminDate').value;
        const tbody = document.getElementById('adminTableBody');
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color: var(--text-muted); padding: 20px;">Загрузка актуального списка...</td></tr>';

        try {
            const response = await fetch(`${API_URL}?booking_date=eq.${selectedDate}&order=booking_time.asc`, {
                method: 'GET',
                headers: {
                    'apikey': ANON_KEY,
                    'Authorization': `Bearer ${ANON_KEY}`,
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) throw new Error('Ошибка связи с Supabase API');
            const data = await response.json();

            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color: var(--text-muted); padding: 20px;">На эту дату записей нет. База чиста.</td></tr>';
                document.getElementById('totalPeople').textContent = '0';
                document.getElementById('totalSum').textContent = '0 ₸';
                document.getElementById('totalCount').textContent = '0';
                return;
            }

            let totalPeople = 0;
            let totalSum = 0;

            data.forEach(item => {
                const calcPrice = item.spots_count * 10000;
                totalPeople += item.spots_count;
                totalSum += calcPrice;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight:bold; color:var(--accent-yellow);">${item.booking_time}</td>
                    <td>
                        <strong>${item.customer_name}</strong><br>
                        <span style="font-size:12px; color:var(--text-muted);">${item.customer_phone}</span>
                    </td>
                    <td style="font-size:14px;">${item.route_name}</td>
                    <td style="font-weight:bold; text-align:center;">${item.spots_count}</td>
                    <td style="font-weight:bold; color:#10b981;">${calcPrice.toLocaleString()} ₸</td>
                    <td>
                        <input type="text" class="prepay-input" id="prepay-${item.id}" value="${item.payment_method || ''}" placeholder="Напр: 5000 Каспи">
                    </td>
                    <td>
                        <input type="text" class="note-input" id="note-${item.id}" value="${item.notes || ''}" placeholder="Экипировка, статус...">
                    </td>
                    <td>
                        <button class="btn-save" onclick="saveRowChanges(${item.id})">OK</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('totalPeople').textContent = totalPeople;
            document.getElementById('totalSum').textContent = totalSum.toLocaleString() + ' ₸';
            document.getElementById('totalCount').textContent = data.length;

        } catch (e) {
            tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:#ef4444; padding: 20px;">Критический сбой: ${e.message}</td></tr>`;
        }
    }

    async function saveRowChanges(id) {
        const prepayValue = document.getElementById(`prepay-${id}`).value.trim();
        const noteValue = document.getElementById(`note-${id}`).value.trim();

        try {
            const response = await fetch(`${API_URL}?id=eq.${id}`, {
                method: 'PATCH',
                headers: {
                    'apikey': ANON_KEY,
                    'Authorization': `Bearer ${ANON_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({
                    payment_method: prepayValue,
                    notes: noteValue
                })
            });

            if (response.ok) {
                loadAdminData();
            } else {
                alert('Не удалось зафиксировать изменения в базе данных.');
            }
        } catch (e) {
            alert('Ошибка отправки: ' + e.message);
        }
    }

    loadAdminData();
</script>
</body>
</html>
