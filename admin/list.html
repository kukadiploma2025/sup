<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUP CLUB ASTANA — Список бронирований</title>
    <style>
        :root {
            --bg-main: #0a0f1d;
            --bg-card: #131a30;
            --accent-gold: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #243256;
            --wa-green: #25d366;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-main); color: var(--text-main); padding: 20px; margin: 0; }
        .admin-container { max-width: 600px; margin: 0 auto; background: var(--bg-card); padding: 25px; border-radius: 24px; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2, h3 { color: var(--accent-gold); margin-top: 0; font-weight: 800; text-align: center; }
        h3 { border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-top: 30px; text-align: left; }
        label { font-weight: 700; display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 13px; text-transform: uppercase; }
        input[type="date"] { width: 100%; padding: 14px; border: 2px solid var(--border-color); border-radius: 14px; box-sizing: border-box; font-size: 16px; background: #0a0f1d; color: var(--text-main); outline: none; margin-bottom: 20px; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        .item-card { background: #0a0f1d; border: 1px solid var(--border-color); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
        .item-info strong { color: var(--accent-gold); font-size: 17px; }
        .item-info p { margin: 4px 0 0 0; font-size: 14px; color: var(--text-muted); }
        .client-name { color: var(--text-main) !important; font-weight: 600; }
        .right-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
        .btn-wa { background: var(--wa-green); color: #fff; border: none; padding: 8px 14px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 13px; text-decoration: none; }
        .status-check { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); cursor: pointer; }
        .status-check input { width: 16px; height: 16px; accent-color: var(--accent-gold); }
        .empty-msg { text-align: center; color: var(--text-muted); padding: 20px; font-style: italic; }
        .hourly-summary { background: rgba(245, 158, 11, 0.05); border: 1px dashed var(--accent-gold); padding: 12px; border-radius: 14px; margin-bottom: 20px; font-size: 14px; }
        .hourly-summary span { margin-right: 15px; font-weight: 600; }
        .attended { border-color: rgba(37, 211, 102, 0.4) !important; background: rgba(37, 211, 102, 0.02) !important; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>SUP CLUB ASTANA <br><span style="font-size:14px; color:var(--text-muted); font-weight:400;">Список записей и отметки</span></h2>

    <label for="filterDate">Выберите дату</label>
    <input type="date" id="filterDate" onchange="loadData()">

    <div id="daySummary" class="hourly-summary" style="display:none;"></div>

    <h3>Бронирования клиентов</h3>
    <div id="bookingsList"></div>
</div>

<script>
    const BASE_SUPABASE_URL = 'https://ununcobobksowzkvbypf.supabase.co/rest/v1';
    const ANON_KEY = 'sb_publishable_G3mrUyo8-jeujpG_Cr56Ew_nHoYTxWN';
    const headers = { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}`, 'Content-Type': 'application/json' };

    const today = new Date();
    document.getElementById('filterDate').value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

    loadData();

    async function loadData() {
        const dateInput = document.getElementById('filterDate').value;
        if (!dateInput) return;

        const bList = document.getElementById('bookingsList');
        const summaryDiv = document.getElementById('daySummary');
        bList.innerHTML = '<div class="empty-msg">Загрузка броней...</div>';
        summaryDiv.style.display = 'none';

        try {
            const response = await fetch(`${BASE_SUPABASE_URL}/bookings?booking_date=eq.${dateInput}&order=booking_time.asc`, { method: 'GET', headers });
            const bookings = response.ok ? await response.json() : [];

            if (bookings.length === 0) {
                bList.innerHTML = '<div class="empty-msg">Нет записей на этот день</div>';
                return;
            }

            bList.innerHTML = '';
            let stats = {};

            bookings.forEach(b => {
                stats[b.booking_time] = (stats[b.booking_time] || 0) + b.spots_count;

                const cleanPhone = b.customer_phone.replace(/\D/g, '');
               const msg = `WhasSAP🏄🌊!, на связи инструктор SUP.CLUB.ASTANA Қуаныш, ${b.customer_name}?! Через сколько вы будете? 🏄‍♂️ Мы на месте!`;
                const waLink = `https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`;
                const isAttended = localStorage.getItem(`attended_${b.id}`) === 'true';

                const card = document.createElement('div');
                card.className = `item-card ${isAttended ? 'attended' : ''}`;
                card.id = `card_${b.id}`;
                card.innerHTML = `
                    <div class="item-info">
                        <strong>[${b.booking_time}] — ${b.spots_count} чел.</strong>
                        <p class="client-name">${b.customer_name} (${b.customer_phone})</p>
                        <p>${b.route_name} | Оплата: ${b.payment_method}</p>
                    </div>
                    <div class="right-actions">
                        <a href="${waLink}" target="_blank" class="btn-wa">💬 Чат</a>
                        <label class="status-check">
                            <input type="checkbox" ${isAttended ? 'checked' : ''} onchange="toggleAttendance(${b.id}, this)">
                            <span>Пришел</span>
                        </label>
                    </div>
                `;
                bList.appendChild(card);
            });

            let summaryHTML = '📊 <strong>Занято мест:</strong> ';
            for (let time in stats) { summaryHTML += `<span>${time}: ${stats[time]}/6 чел.</span>`; }
            summaryDiv.innerHTML = summaryHTML;
            summaryDiv.style.display = 'block';

        } catch (e) { bList.innerHTML = '<div class="empty-msg" style="color:#ef4444">Ошибка загрузки данных</div>'; }
    }

    function toggleAttendance(id, checkbox) {
        const card = document.getElementById(`card_${id}`);
        if (checkbox.checked) {
            card.classList.add('attended');
            localStorage.setItem(`attended_${id}`, 'true');
        } else {
            card.classList.remove('attended');
            localStorage.setItem(`attended_${id}`, 'false');
        }
    }
</script>
</body>
</html>
