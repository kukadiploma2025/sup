<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUP CLUB ASTANA — Список бронирований</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --accent-yellow: #f59e0b;
            --accent-green: #25d366;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h2 {
            color: var(--accent-yellow);
            text-align: center;
            margin-bottom: 30px;
            font-weight: 800;
        }
        .booking-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .info-group strong {
            display: block;
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .info-group span {
            font-size: 16px;
            font-weight: 600;
        }
        .created-at-tag {
            font-size: 12px;
            color: var(--accent-yellow);
            background: rgba(245, 158, 11, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }
        .actions {
            margin-top: 15px;
            display: flex;
            justify-content: flex-end;
        }
        .btn-wa {
            background: var(--accent-green);
            color: #fff;
            padding: 10px 18px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s;
        }
        .btn-wa:hover {
            opacity: 0.9;
        }
        .loader {
            text-align: center;
            color: var(--text-muted);
            font-size: 18px;
            padding: 50px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Список всех бронирований</h2>
    <div id="bookingsList">
        <div class="loader">Загрузка данных из базы...</div>
    </div>
</div>

<script>
    const BASE_SUPABASE_URL = 'https://ununcobobksowzkvbypf.supabase.co/rest/v1';
    const ANON_KEY = 'sb_publishable_G3mrUyo8-jeujpG_Cr56Ew_nHoYTxWN';

    async function loadBookings() {
        const listContainer = document.getElementById('bookingsList');
        
        try {
            const response = await fetch(`${BASE_SUPABASE_URL}/bookings?order=booking_date.desc,booking_time.asc`, {
                method: 'GET',
                headers: {
                    'apikey': ANON_KEY,
                    'Authorization': `Bearer ${ANON_KEY}`,
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) throw new Error('Ошибка при получении данных');

            const bookings = await response.json();
            
            if (bookings.length === 0) {
                listContainer.innerHTML = '<div class="loader">Бронирований пока нет.</div>';
                return;
            }

            listContainer.innerHTML = ''; // Очищаем лоадер

            bookings.forEach(booking => {
                // 1. Форматируем время создания записи (когда была нажата кнопка)
                let formattedCreatedAt = 'Не указано';
                if (booking.created_at) {
                    const dateObj = new Date(booking.created_at);
                    // Переводим в красивый вид: ДД.ММ.ГГГГ в ЧЧ:ММ
                    formattedCreatedAt = dateObj.toLocaleString('ru-RU', {
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }

                // 2. Генерируем ссылку в WhatsApp с готовым текстом
                const cleanPhone = booking.customer_phone.replace(/\D/g, ''); // чистим номер от скобок
                const messageText = `Салам, ${booking.customer_name}! 🏄‍♂️\nВаша бронь в SUP CLUB ASTANA подтверждена!\n\nМаршрут: ${booking.route_name}\nДата: ${booking.booking_date}\nВремя: ${booking.booking_time}\nКоличество: ${booking.spots_count} чел.\nСпособ оплаты: ${booking.payment_method}\n\nЖдем вас! Пожалуйста, подходите за 15 минут до старта для инструктажа.`;
                const waLink = `https://wa.me/${cleanPhone}?text=${encodeURIComponent(messageText)}`;

                // 3. Создаем карточку брони
                const card = document.createElement('div');
                card.className = 'booking-card';
                card.innerHTML = `
                    <div class="created-at-tag">Заявка оставлена: ${formattedCreatedAt}</div>
                    <div class="grid">
                        <div class="info-group">
                            <strong>Клиент</strong>
                            <span>${booking.customer_name}</span>
                        </div>
                        <div class="info-group">
                            <strong>Телефон</strong>
                            <span>${booking.customer_phone}</span>
                        </div>
                        <div class="info-group">
                            <strong>Дата сплава</strong>
                            <span style="color: var(--accent-yellow);">${booking.booking_date}</span>
                        </div>
                        <div class="info-group">
                            <strong>Время сплава</strong>
                            <span style="color: var(--accent-yellow);">${booking.booking_time}</span>
                        </div>
                        <div class="info-group">
                            <strong>Маршрут</strong>
                            <span>${booking.route_name}</span>
                        </div>
                        <div class="info-group">
                            <strong>Места</strong>
                            <span>${booking.spots_count} чел.</span>
                        </div>
                        <div class="info-group">
                            <strong>Оплата</strong>
                            <span>${booking.payment_method}</span>
                        </div>
                    </div>
                    <div class="actions">
                        <a href="${waLink}" target="_blank" class="btn-wa">
                            💬 Написать в WhatsApp (Подтвердить)
                        </a>
                    </div>
                `;
                listContainer.appendChild(card);
            });

        } catch (error) {
            console.error(error);
            listContainer.innerHTML = `<div class="loader" style="color: #ef4444;">Ошибка загрузки: ${error.message}</div>`;
        }
    }

    // Запускаем загрузку при открытии страницы
    window.onload = loadBookings;
</script>
</body>
</html>
